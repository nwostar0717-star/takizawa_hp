  <path d="M240 300 C255 330, 345 330, 360 300" fill="#E84A4A" class="line"/>
  <path d="M310 300 C325 360, 345 430, 360 500" fill="#E84A4A" class="line"/>

  <!-- Hands -->
  <circle cx="265" cy="390" r="30" fill="#FFF7F0" class="line"/>
  <circle cx="335" cy="390" r="30" fill="#FFF7F0" class="line"/>

  <!-- Cup -->
  <rect x="270" y="360" width="60" height="70" rx="10" fill="#C8843E" class="line"/>
  <path d="M330 370 C350 370, 355 390, 335 395" class="line"/>

  <!-- Buttons -->
  <circle cx="300" cy="420" r="6" fill="#2D2A26"/>
  <circle cx="300" cy="460" r="6" fill="#2D2A26"/>

  <!-- Arms -->
  <path d="M220 350 C245 360, 260 370, 270 380" class="line"/>
  <path d="M380 350 C355 360, 340 370, 330 380" class="line"/>
</svg>
